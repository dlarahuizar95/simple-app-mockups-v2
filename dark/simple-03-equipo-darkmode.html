<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple App — Equipo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>

:root[data-theme="dark"]{
  --navy:#0F2336;--navy-dk:#0a1a28;
  --blue:#7A97AB;--blue-lt:#A8BEC9;--blue-dk:#5d7a8e;
  --sage:#A3A983;--sage-dk:#7A7E5E;--sage-lt:#C5C7A5;--sage-bg:#F3F4EB;
  --page-bg:#EEEDE7;--screen-bg:#F5F4EE;
  --card-bg:#FFFFFF;--card-bg-alt:#FAF9F4;
  --surface-hi:#FFFFFF;--surface-low:#F0EFE9;
  --text:#0F2336;--text-md:#374151;--text-sm:#6B7280;--text-inv:#F5F4EE;
  --border:#E0DDD4;--border-soft:#EBE8DF;--border-strong:#CBC7BB;
  --success:#7A9D6B;--danger:#B85450;--warning:#C4913A;
  --hero-bg:var(--navy);
  --hero-border:transparent;
  --r-sm:8px;--r:12px;--r-lg:20px;--r-xl:28px;
  --shadow-phone:0 30px 80px -20px rgba(15,35,54,.25),0 12px 32px -12px rgba(15,35,54,.15);
}
:root[data-theme="dark"]{
  --navy:#0a1520;--navy-dk:#060d15;
  --blue:#9AB5C8;--blue-lt:#BDD0DB;--blue-dk:#6A8295;
  --sage:#B8BE99;--sage-dk:#9EA384;--sage-lt:#D4D7B8;--sage-bg:#1E2319;
  --page-bg:#0A0D12;--screen-bg:#14181E;
  --card-bg:#1C2029;--card-bg-alt:#22272F;
  --surface-hi:#242933;--surface-low:#0F1319;
  --text:#F5F4EE;--text-md:#C5C5BE;--text-sm:#8A8A83;--text-inv:#0A0D12;
  --border:#2A2F38;--border-soft:#22262E;--border-strong:#3A404B;
  --success:#9DBD8D;--danger:#D4756F;--warning:#E0AC5D;
  --hero-bg:#242933;
  --hero-border:#2A2F38;
  --r-sm:8px;--r:12px;--r-lg:20px;--r-xl:28px;
  --shadow-phone:0 30px 80px -20px rgba(0,0,0,.6),0 12px 32px -12px rgba(0,0,0,.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;
  color:var(--text);background:var(--page-bg);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:40px 20px;
  transition:background .4s ease,color .4s ease;
}
/* Phone frame */
.phone{
  width:360px;height:740px;
  background:#0a0a0a;border-radius:54px;padding:11px;
  box-shadow:var(--shadow-phone);
  position:relative;flex-shrink:0;
}
.phone::before{
  content:'';position:absolute;top:22px;left:50%;
  transform:translateX(-50%);width:110px;height:30px;
  background:#000;border-radius:22px;z-index:10;
}
.screen{
  width:100%;height:100%;background:var(--screen-bg);
  border-radius:43px;overflow:hidden;position:relative;
  display:flex;flex-direction:column;
  transition:background .4s ease;
}
.status{
  height:48px;flex-shrink:0;display:flex;align-items:center;
  justify-content:space-between;padding:16px 32px 0;
  font-size:13px;font-weight:600;color:var(--text);
}
.status-right{display:flex;align-items:center;gap:6px}
.status-dot{width:17px;height:10px;border:1px solid var(--text);border-radius:2px;position:relative}
.status-dot::after{content:'';position:absolute;inset:1px;background:var(--text);border-radius:1px}
.app-header{padding:16px 24px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.app-back,.app-icon-btn{
  width:38px;height:38px;border-radius:50%;
  background:var(--surface-hi);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--text);
}
.app-wordmark{font-size:18px;font-weight:300;color:var(--text);letter-spacing:-.3px}
.app-wordmark strong{font-weight:600}
.content{flex:1;overflow:hidden;padding:0 24px 24px;display:flex;flex-direction:column;gap:18px}
.page-meta{margin-top:6px}
.eyebrow{
  font-size:10px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--sage-dk);
  display:flex;align-items:center;gap:8px;margin-bottom:7px;
}
:root[data-theme="dark"] .eyebrow{color:var(--sage-lt)}
.eyebrow::before{content:'';width:16px;height:1px;background:var(--sage)}
.page-h{font-size:27px;font-weight:700;letter-spacing:-.7px;line-height:1.1;color:var(--text)}
.page-h em{font-style:italic;font-family:'Cormorant Garamond',serif;font-weight:500;color:var(--blue)}
.page-sub-sm{font-size:13px;color:var(--text-sm);margin-top:5px;line-height:1.5}
.btn-primary{
  width:100%;padding:16px;background:var(--navy);color:#fff;
  border:none;border-radius:var(--r);font-family:inherit;
  font-size:13px;font-weight:600;letter-spacing:-.1px;
  display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;
}
:root[data-theme="dark"] .btn-primary{background:var(--sage);color:var(--navy)}
.btn-secondary{
  width:100%;padding:15px;background:var(--card-bg);color:var(--text);
  border:1px solid var(--border);border-radius:var(--r);font-family:inherit;
  font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;
}


.eq-hero{background:var(--card-bg-alt);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;text-align:center;position:relative;overflow:hidden}
.eq-hero::before{content:'';position:absolute;top:-55px;left:50%;transform:translateX(-50%);width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(122,151,171,.12) 0%,transparent 60%)}
.eq-vis{width:100px;height:100px;margin:0 auto 14px;position:relative}
.eq-vis-ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--sage);box-shadow:0 0 0 6px rgba(163,169,131,.15)}
.eq-vis-core{position:absolute;inset:16px;border-radius:50%;background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 100%);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
:root[data-theme="dark"] .eq-vis-core{background:linear-gradient(135deg,var(--blue-dk) 0%,var(--blue) 100%)}
.eq-name{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.3px;position:relative}
.eq-status{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--sage-dk);font-weight:600;margin-top:4px;position:relative}
:root[data-theme="dark"] .eq-status{color:var(--sage-lt)}
.eq-dot{width:7px;height:7px;border-radius:50%;background:var(--sage);box-shadow:0 0 0 3px rgba(163,169,131,.18)}
.eq-actions{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.eq-btn{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r);padding:16px 11px;display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--text)}
.eq-btn.primary{background:var(--navy);border-color:var(--navy);color:#fff}
:root[data-theme="dark"] .eq-btn.primary{background:var(--sage);border-color:var(--sage);color:var(--navy)}
.eq-btn-ic{width:30px;height:30px;display:flex;align-items:center;justify-content:center}
.eq-btn-lbl{font-size:12px;font-weight:600}
.eq-btn-sub{font-size:10px;opacity:.6;margin-top:1px}
.eq-info{background:var(--sage-bg);border:1px solid rgba(163,169,131,.25);border-radius:var(--r);padding:13px 15px;display:flex;gap:11px;align-items:flex-start}
:root[data-theme="dark"] .eq-info{background:rgba(163,169,131,.08);border-color:rgba(163,169,131,.2)}
.eq-info-ic{color:var(--sage-dk);flex-shrink:0}
:root[data-theme="dark"] .eq-info-ic{color:var(--sage-lt)}
.eq-info-txt{font-size:11px;color:var(--text-md);line-height:1.5}
.eq-info-txt strong{color:var(--text);font-weight:700}
.danger-btn{width:100%;padding:15px;background:var(--card-bg);border:1px solid var(--danger);color:var(--danger);border-radius:var(--r);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px;font-family:inherit}

</style>
</head>
<body>
<div class="phone"><div class="screen">
<div class="status"><span>9:41</span><div class="status-right"><span>5G</span><span>●●●</span><div class="status-dot"></div></div></div><div class="app-header"><div class="app-back"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></div><div class="app-wordmark">simple<strong>.</strong></div><div style="width:38px"></div></div>
<div class="content">

        <div class="page-meta">
          <div class="eyebrow">Dispositivo</div>
          <div class="page-h">Tu <em>equipo</em></div>
          <div class="page-sub-sm">Estado y control del filtro SimpleOne</div>
        </div>
        <div class="eq-hero">
          <div class="eq-vis">
            <div class="eq-vis-ring"></div>
            <div class="eq-vis-core">ON</div>
          </div>
          <div class="eq-name">SimpleOne · Río Nazas</div>
          <div class="eq-status"><div class="eq-dot"></div>Conectado · WiFi estable</div>
        </div>
        <div class="eq-actions">
          <div class="eq-btn primary">
            <div class="eq-btn-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8M21 3v5h-5"/></svg></div>
            <div class="eq-btn-lbl">Reiniciar</div>
            <div class="eq-btn-sub">Si hay fallas</div>
          </div>
          <div class="eq-btn">
            <div class="eq-btn-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12.55a11 11 0 0 1 14 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg></div>
            <div class="eq-btn-lbl">Red WiFi</div>
            <div class="eq-btn-sub">Reconectar</div>
          </div>
        </div>
        <div class="eq-info">
          <div class="eq-info-ic"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg></div>
          <div class="eq-info-txt"><strong>Apagar el equipo</strong> detiene el flujo de agua. Solo úsalo en caso de mantenimiento o ausencia prolongada.</div>
        </div>
        <button class="danger-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0M12 2v10"/></svg>
          Apagar dispositivo
        </button>
        
</div>
</div></div>
</body>
</html>
