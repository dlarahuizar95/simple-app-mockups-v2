<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple App — Perfil</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>

:root{
  --navy:#0F2336;--navy-dk:#0a1a28;
  --blue:#7A97AB;--blue-lt:#A8BEC9;--blue-dk:#5d7a8e;
  --sage:#A3A983;--sage-dk:#7A7E5E;--sage-lt:#C5C7A5;--sage-bg:#F3F4EB;
  --page-bg:#EEEDE7;--screen-bg:#F5F4EE;
  --card-bg:#FFFFFF;--card-bg-alt:#FAF9F4;
  --surface-hi:#FFFFFF;--surface-low:#F0EFE9;
  --text:#0F2336;--text-md:#374151;--text-sm:#6B7280;
  --border:#E0DDD4;--border-soft:#EBE8DF;--border-strong:#CBC7BB;
  --success:#7A9D6B;--danger:#B85450;--warning:#C4913A;
  --r-sm:8px;--r:12px;--r-lg:20px;--r-xl:28px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;
  color:var(--text);background:var(--page-bg);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:40px 20px;
}

/* Phone frame */
.phone{
  width:360px;height:740px;
  background:#0a0a0a;border-radius:54px;padding:11px;
  box-shadow:0 30px 80px -20px rgba(15,35,54,.25),0 12px 32px -12px rgba(15,35,54,.15);
  position:relative;flex-shrink:0;
}
.phone::before{
  content:'';position:absolute;top:22px;left:50%;
  transform:translateX(-50%);width:110px;height:30px;
  background:#000;border-radius:22px;z-index:10;
}
.screen{
  width:100%;height:100%;background:var(--screen-bg);
  border-radius:43px;overflow:hidden;position:relative;
  display:flex;flex-direction:column;
}

/* Status bar */
.status{
  height:48px;flex-shrink:0;display:flex;align-items:center;
  justify-content:space-between;padding:16px 32px 0;
  font-size:13px;font-weight:600;color:var(--text);
}
.status-right{display:flex;align-items:center;gap:6px}
.status-dot{width:17px;height:10px;border:1px solid var(--text);border-radius:2px;position:relative}
.status-dot::after{content:'';position:absolute;inset:1px;background:var(--text);border-radius:1px}

/* App header */
.app-header{padding:16px 24px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.app-back,.app-icon-btn{
  width:38px;height:38px;border-radius:50%;
  background:var(--surface-hi);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--text);
}
.app-wordmark{font-size:18px;font-weight:300;color:var(--text);letter-spacing:-.3px}
.app-wordmark strong{font-weight:600}

/* Content */
.content{flex:1;overflow:hidden;padding:0 24px 24px;display:flex;flex-direction:column;gap:18px}
.page-meta{margin-top:6px}
.eyebrow{
  font-size:10px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--sage-dk);
  display:flex;align-items:center;gap:8px;margin-bottom:7px;
}
.eyebrow::before{content:'';width:16px;height:1px;background:var(--sage)}
.page-h{font-size:27px;font-weight:700;letter-spacing:-.7px;line-height:1.1;color:var(--text)}
.page-h em{font-style:italic;font-family:'Cormorant Garamond',serif;font-weight:500;color:var(--blue)}
.page-sub-sm{font-size:13px;color:var(--text-sm);margin-top:5px;line-height:1.5}


.profile-card{background:linear-gradient(135deg,var(--card-bg-alt) 0%,var(--card-bg) 100%);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px 22px;text-align:center}
.pc-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 100%);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:25px;font-weight:700;letter-spacing:-.5px;border:2px solid var(--card-bg);box-shadow:0 8px 24px rgba(15,35,54,.15)}
.pc-name{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.3px;margin-bottom:4px}
.pc-email{font-size:12px;color:var(--text-sm)}
.pc-badge{display:inline-flex;align-items:center;gap:5px;background:var(--sage-bg);border:1px solid rgba(163,169,131,.3);padding:5px 11px;border-radius:100px;font-size:10px;font-weight:700;color:var(--sage-dk);margin-top:11px;letter-spacing:.04em;text-transform:uppercase}
.menu-list{display:flex;flex-direction:column;gap:2px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.menu-item{display:flex;align-items:center;gap:13px;padding:14px 16px;border-bottom:1px solid var(--border-soft)}
.menu-item:last-child{border-bottom:none}
.menu-ic{width:32px;height:32px;border-radius:8px;background:var(--surface-low);display:flex;align-items:center;justify-content:center;color:var(--text);flex-shrink:0}
.menu-lbl{flex:1;font-size:13px;font-weight:600;color:var(--text)}
.menu-chev{color:var(--text-sm);font-size:14px}
.danger-ic{background:rgba(184,84,80,.12);color:var(--danger)}
.danger-lbl{color:var(--danger)}
.version{text-align:center;font-size:10px;color:var(--text-sm);margin-top:9px;letter-spacing:.04em}

</style>
</head>
<body>
<div class="phone"><div class="screen">

    <div class="status">
      <span>10:26</span>
      <div class="status-right"><span>5G</span><span>●●●</span><div class="status-dot"></div></div>
    </div>
    <div class="app-header">
      <div class="app-back"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></div>
      <div class="app-wordmark">simple<strong>.</strong></div>
      <div style="width:38px"></div>
    </div>
    
<div class="content">

        <div class="page-meta">
          <div class="eyebrow">Cuenta</div>
          <div class="page-h">Mi <em>perfil</em></div>
        </div>
        <div class="profile-card">
          <div class="pc-avatar">DL</div>
          <div class="pc-name">Daniela Lara</div>
          <div class="pc-email">dlarahuizar@gmail.com</div>
          <div class="pc-badge">● Miembro activo</div>
        </div>
        <div class="menu-list">
          <div class="menu-item">
            <div class="menu-ic"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2l3 7h7l-5.5 4.5 2 7-6.5-4.5-6.5 4.5 2-7-5.5-4.5h7z"/></svg></div>
            <div class="menu-lbl">Agregar membresía</div>
            <div class="menu-chev">›</div>
          </div>
          <div class="menu-item">
            <div class="menu-ic"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/></svg></div>
            <div class="menu-lbl">Métodos de pago</div>
            <div class="menu-chev">›</div>
          </div>
          <div class="menu-item">
            <div class="menu-ic"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg></div>
            <div class="menu-lbl">Datos de facturación</div>
            <div class="menu-chev">›</div>
          </div>
          <div class="menu-item">
            <div class="menu-ic"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01"/></svg></div>
            <div class="menu-lbl">Ayuda y soporte</div>
            <div class="menu-chev">›</div>
          </div>
        </div>
        <div class="menu-list">
          <div class="menu-item">
            <div class="menu-ic danger-ic"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></div>
            <div class="menu-lbl danger-lbl">Cerrar sesión</div>
            <div class="menu-chev">›</div>
          </div>
        </div>
        <div class="version">V26.1.02 · Simple by Junghanns</div>
        
</div>
</div></div>
</body>
</html>
