<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple App — Home</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>

:root{
  --navy:#0F2336;--navy-dk:#0a1a28;
  --blue:#7A97AB;--blue-lt:#A8BEC9;--blue-dk:#5d7a8e;
  --sage:#A3A983;--sage-dk:#7A7E5E;--sage-lt:#C5C7A5;--sage-bg:#F3F4EB;
  --page-bg:#EEEDE7;--screen-bg:#F5F4EE;
  --card-bg:#FFFFFF;--card-bg-alt:#FAF9F4;
  --surface-hi:#FFFFFF;--surface-low:#F0EFE9;
  --text:#0F2336;--text-md:#374151;--text-sm:#6B7280;
  --border:#E0DDD4;--border-soft:#EBE8DF;--border-strong:#CBC7BB;
  --success:#7A9D6B;--danger:#B85450;--warning:#C4913A;
  --r-sm:8px;--r:12px;--r-lg:20px;--r-xl:28px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;
  color:var(--text);background:var(--page-bg);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:40px 20px;
}

/* Phone frame */
.phone{
  width:360px;height:740px;
  background:#0a0a0a;border-radius:54px;padding:11px;
  box-shadow:0 30px 80px -20px rgba(15,35,54,.25),0 12px 32px -12px rgba(15,35,54,.15);
  position:relative;flex-shrink:0;
}
.phone::before{
  content:'';position:absolute;top:22px;left:50%;
  transform:translateX(-50%);width:110px;height:30px;
  background:#000;border-radius:22px;z-index:10;
}
.screen{
  width:100%;height:100%;background:var(--screen-bg);
  border-radius:43px;overflow:hidden;position:relative;
  display:flex;flex-direction:column;
}

/* Status bar */
.status{
  height:48px;flex-shrink:0;display:flex;align-items:center;
  justify-content:space-between;padding:16px 32px 0;
  font-size:13px;font-weight:600;color:var(--text);
}
.status-right{display:flex;align-items:center;gap:6px}
.status-dot{width:17px;height:10px;border:1px solid var(--text);border-radius:2px;position:relative}
.status-dot::after{content:'';position:absolute;inset:1px;background:var(--text);border-radius:1px}

/* App header */
.app-header{padding:16px 24px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.app-back,.app-icon-btn{
  width:38px;height:38px;border-radius:50%;
  background:var(--surface-hi);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--text);
}
.app-wordmark{font-size:18px;font-weight:300;color:var(--text);letter-spacing:-.3px}
.app-wordmark strong{font-weight:600}

/* Content */
.content{flex:1;overflow:hidden;padding:0 24px 24px;display:flex;flex-direction:column;gap:18px}
.page-meta{margin-top:6px}
.eyebrow{
  font-size:10px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--sage-dk);
  display:flex;align-items:center;gap:8px;margin-bottom:7px;
}
.eyebrow::before{content:'';width:16px;height:1px;background:var(--sage)}
.page-h{font-size:27px;font-weight:700;letter-spacing:-.7px;line-height:1.1;color:var(--text)}
.page-h em{font-style:italic;font-family:'Cormorant Garamond',serif;font-weight:500;color:var(--blue)}
.page-sub-sm{font-size:13px;color:var(--text-sm);margin-top:5px;line-height:1.5}


.hero-card{background:var(--navy);border-radius:var(--r-lg);padding:22px 22px 20px;color:#fff;position:relative;overflow:hidden}
.hero-card::before{content:'';position:absolute;top:-45px;right:-45px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(122,151,171,.28) 0%,transparent 65%);pointer-events:none}
.hc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;position:relative}
.hc-label{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:5px}
.hc-location{font-size:15px;font-weight:600;letter-spacing:-.2px;color:#fff;display:flex;align-items:center;gap:7px}
.hc-edit{width:15px;height:15px;opacity:.5}
.hc-status{display:flex;align-items:center;gap:6px;background:rgba(163,169,131,.18);border:1px solid rgba(163,169,131,.35);padding:5px 10px;border-radius:100px;font-size:10px;font-weight:600;color:var(--sage-lt)}
.hc-status-dot{width:7px;height:7px;border-radius:50%;background:var(--sage-lt);box-shadow:0 0 0 3px rgba(163,169,131,.2)}
.hc-main{display:flex;align-items:baseline;gap:7px;position:relative;margin-bottom:5px;color:#fff}
.hc-num{font-size:50px;font-weight:800;letter-spacing:-2px;line-height:1}
.hc-unit{font-size:15px;font-weight:500;color:rgba(255,255,255,.55)}
.hc-desc{font-size:12px;color:rgba(255,255,255,.55);margin-bottom:16px;position:relative}
.hc-bar{height:6px;background:rgba(255,255,255,.08);border-radius:100px;overflow:hidden;margin-bottom:9px;position:relative}
.hc-bar-fill{height:100%;width:75%;background:linear-gradient(90deg,var(--sage) 0%,var(--sage-lt) 100%);border-radius:100px}
.hc-bar-meta{display:flex;justify-content:space-between;font-size:10.5px;color:rgba(255,255,255,.45);position:relative}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r);padding:15px 15px 13px;position:relative;overflow:hidden}
.stat-card.accent{background:var(--sage-bg);border-color:rgba(163,169,131,.25)}
.stat-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-sm);margin-bottom:7px}
.stat-num{font-size:25px;font-weight:800;letter-spacing:-.9px;color:var(--text);line-height:1}
.stat-num-sm{font-size:12px;font-weight:500;color:var(--text-sm);margin-left:3px}
.stat-delta{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:600;color:var(--sage-dk);margin-top:7px}
.quick{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.qa{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r);padding:14px 9px 12px;display:flex;flex-direction:column;align-items:center;gap:7px}
.qa-ic{width:36px;height:36px;border-radius:9px;background:var(--sage-bg);display:flex;align-items:center;justify-content:center;color:var(--sage-dk)}
.qa-lbl{font-size:11px;font-weight:600;color:var(--text);text-align:center;line-height:1.2}

</style>
</head>
<body>
<div class="phone"><div class="screen">

    <div class="status">
      <span>10:26</span>
      <div class="status-right"><span>5G</span><span>●●●</span><div class="status-dot"></div></div>
    </div>
    <div class="app-header">
      <div class="app-icon-btn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg></div>
      <div class="app-wordmark">simple<strong>.</strong></div>
      <div class="app-icon-btn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 17h5l-1.4-1.4A7 7 0 0 0 19 10a7 7 0 1 0-14 0c0 2.1.9 4 2.4 5.4L6 17h5m4 0a2 2 0 1 1-4 0"/></svg></div>
    </div>
    
<div class="content">

        <div class="page-meta">
          <div class="eyebrow">Tu hogar</div>
          <div class="page-h">Buenos días, <em>Daniela</em></div>
        </div>
        <div class="hero-card">
          <div class="hc-top">
            <div>
              <div class="hc-label">Río Nazas</div>
              <div class="hc-location">Dispositivo principal
                <svg class="hc-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
              </div>
            </div>
            <div class="hc-status"><div class="hc-status-dot"></div>Activo</div>
          </div>
          <div class="hc-main"><span class="hc-num">500</span><span class="hc-unit">litros disponibles</span></div>
          <div class="hc-desc">Equivale a ≈ 33 garrafones de 19L</div>
          <div class="hc-bar"><div class="hc-bar-fill"></div></div>
          <div class="hc-bar-meta"><span>75% de capacidad</span><span>Próxima recarga · 18 may</span></div>
        </div>
        <div class="stat-row">
          <div class="stat-card accent">
            <div class="stat-label">Consumo hoy</div>
            <div class="stat-num">3.8<span class="stat-num-sm">L</span></div>
            <div class="stat-delta">↑ 15% vs ayer</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Promedio diario</div>
            <div class="stat-num">3.3<span class="stat-num-sm">L</span></div>
            <div class="stat-delta" style="color:var(--text-sm)">Últimos 30 días</div>
          </div>
        </div>
        <div class="quick">
          <div class="qa"><div class="qa-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2l4 8h6l-5 5 2 7-7-4-7 4 2-7-5-5h6z"/></svg></div><div class="qa-lbl">Mi plan</div></div>
          <div class="qa"><div class="qa-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="16" rx="3"/><path d="M12 8v8M8 12h8"/></svg></div><div class="qa-lbl">Equipo</div></div>
          <div class="qa"><div class="qa-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 3v18h18M7 14l4-4 4 4 5-5"/></svg></div><div class="qa-lbl">Consumos</div></div>
        </div>
        
</div>
</div></div>
</body>
</html>
