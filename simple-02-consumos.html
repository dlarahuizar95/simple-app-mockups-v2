<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple App — Consumos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>

:root{
  --navy:#0F2336;--navy-dk:#0a1a28;
  --blue:#7A97AB;--blue-lt:#A8BEC9;--blue-dk:#5d7a8e;
  --sage:#A3A983;--sage-dk:#7A7E5E;--sage-lt:#C5C7A5;--sage-bg:#F3F4EB;
  --page-bg:#EEEDE7;--screen-bg:#F5F4EE;
  --card-bg:#FFFFFF;--card-bg-alt:#FAF9F4;
  --surface-hi:#FFFFFF;--surface-low:#F0EFE9;
  --text:#0F2336;--text-md:#374151;--text-sm:#6B7280;
  --border:#E0DDD4;--border-soft:#EBE8DF;--border-strong:#CBC7BB;
  --success:#7A9D6B;--danger:#B85450;--warning:#C4913A;
  --r-sm:8px;--r:12px;--r-lg:20px;--r-xl:28px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;
  color:var(--text);background:var(--page-bg);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:40px 20px;
}

/* Phone frame */
.phone{
  width:360px;height:740px;
  background:#0a0a0a;border-radius:54px;padding:11px;
  box-shadow:0 30px 80px -20px rgba(15,35,54,.25),0 12px 32px -12px rgba(15,35,54,.15);
  position:relative;flex-shrink:0;
}
.phone::before{
  content:'';position:absolute;top:22px;left:50%;
  transform:translateX(-50%);width:110px;height:30px;
  background:#000;border-radius:22px;z-index:10;
}
.screen{
  width:100%;height:100%;background:var(--screen-bg);
  border-radius:43px;overflow:hidden;position:relative;
  display:flex;flex-direction:column;
}

/* Status bar */
.status{
  height:48px;flex-shrink:0;display:flex;align-items:center;
  justify-content:space-between;padding:16px 32px 0;
  font-size:13px;font-weight:600;color:var(--text);
}
.status-right{display:flex;align-items:center;gap:6px}
.status-dot{width:17px;height:10px;border:1px solid var(--text);border-radius:2px;position:relative}
.status-dot::after{content:'';position:absolute;inset:1px;background:var(--text);border-radius:1px}

/* App header */
.app-header{padding:16px 24px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.app-back,.app-icon-btn{
  width:38px;height:38px;border-radius:50%;
  background:var(--surface-hi);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--text);
}
.app-wordmark{font-size:18px;font-weight:300;color:var(--text);letter-spacing:-.3px}
.app-wordmark strong{font-weight:600}

/* Content */
.content{flex:1;overflow:hidden;padding:0 24px 24px;display:flex;flex-direction:column;gap:18px}
.page-meta{margin-top:6px}
.eyebrow{
  font-size:10px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--sage-dk);
  display:flex;align-items:center;gap:8px;margin-bottom:7px;
}
.eyebrow::before{content:'';width:16px;height:1px;background:var(--sage)}
.page-h{font-size:27px;font-weight:700;letter-spacing:-.7px;line-height:1.1;color:var(--text)}
.page-h em{font-style:italic;font-family:'Cormorant Garamond',serif;font-weight:500;color:var(--blue)}
.page-sub-sm{font-size:13px;color:var(--text-sm);margin-top:5px;line-height:1.5}


.period-tabs{display:flex;gap:4px;background:var(--surface-low);padding:4px;border-radius:11px;border:1px solid var(--border)}
.period-tab{flex:1;font-size:11.5px;font-weight:600;padding:8px 4px;border-radius:8px;color:var(--text-sm);text-align:center}
.period-tab.active{background:var(--card-bg);color:var(--text);box-shadow:0 1px 3px rgba(15,35,54,.08)}
.kpi-strip{display:flex;gap:11px;padding:16px 18px;background:var(--navy);border-radius:var(--r-lg);color:#fff;align-items:center;justify-content:space-between}
.kpi-item{flex:1}
.kpi-lbl{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:4px}
.kpi-val{font-size:18px;font-weight:800;letter-spacing:-.5px;color:#fff}
.kpi-val span{font-size:11px;font-weight:500;color:rgba(255,255,255,.55);margin-left:2px}
.kpi-sep{width:1px;height:28px;background:rgba(255,255,255,.15)}
.chart-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px}
.chart-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:15px}
.chart-title{font-size:13px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.chart-sub{font-size:11px;color:var(--text-sm);margin-top:2px}
.chart-legend{display:flex;gap:10px;font-size:10px;color:var(--text-sm)}
.chart-legend-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.chart-area{height:110px;position:relative;margin-bottom:9px}
.chart-svg{width:100%;height:100%}
.x-axis{display:flex;justify-content:space-between;font-size:9.5px;color:var(--text-sm);font-weight:500;padding-top:5px;border-top:1px solid var(--border-soft)}
.bar-chart{display:flex;align-items:flex-end;justify-content:space-between;gap:7px;height:100px;padding-bottom:22px;border-bottom:1px solid var(--border-soft);position:relative;margin-bottom:9px}
.bar{flex:1;background:linear-gradient(180deg,var(--blue) 0%,var(--blue-lt) 100%);border-radius:5px 5px 0 0;position:relative}
.bar.highlight{background:linear-gradient(180deg,var(--sage-dk) 0%,var(--sage) 100%)}
.bar-label{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--text-sm);font-weight:500}

</style>
</head>
<body>
<div class="phone"><div class="screen">

    <div class="status">
      <span>10:26</span>
      <div class="status-right"><span>5G</span><span>●●●</span><div class="status-dot"></div></div>
    </div>
    <div class="app-header">
      <div class="app-back"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></div>
      <div class="app-wordmark">simple<strong>.</strong></div>
      <div style="width:38px"></div>
    </div>
    
<div class="content">

        <div class="page-meta">
          <div class="eyebrow">Analítica</div>
          <div class="page-h">Tus <em>consumos</em></div>
          <div class="page-sub-sm">Tendencias y detalle por periodo</div>
        </div>
        <div class="period-tabs">
          <div class="period-tab">Semana</div>
          <div class="period-tab active">Mes</div>
          <div class="period-tab">3 meses</div>
          <div class="period-tab">Año</div>
        </div>
        <div class="kpi-strip">
          <div class="kpi-item"><div class="kpi-lbl">Total</div><div class="kpi-val">98.4<span>L</span></div></div>
          <div class="kpi-sep"></div>
          <div class="kpi-item"><div class="kpi-lbl">Promedio</div><div class="kpi-val">3.3<span>L/día</span></div></div>
          <div class="kpi-sep"></div>
          <div class="kpi-item"><div class="kpi-lbl">Ahorro</div><div class="kpi-val" style="color:var(--sage-lt)">$412</div></div>
        </div>
        <div class="chart-card">
          <div class="chart-head">
            <div>
              <div class="chart-title">Consumo diario</div>
              <div class="chart-sub">Mayo 2026 · vs. abril</div>
            </div>
            <div class="chart-legend">
              <span><span class="chart-legend-dot" style="background:var(--text)"></span>Mayo</span>
              <span><span class="chart-legend-dot" style="background:var(--border-strong)"></span>Abril</span>
            </div>
          </div>
          <div class="chart-area">
            <svg class="chart-svg" viewBox="0 0 300 100" preserveAspectRatio="none">
              <line x1="0" y1="25" x2="300" y2="25" stroke="#EBE8DF" stroke-width="1"/>
              <line x1="0" y1="50" x2="300" y2="50" stroke="#EBE8DF" stroke-width="1"/>
              <line x1="0" y1="75" x2="300" y2="75" stroke="#EBE8DF" stroke-width="1"/>
              <path d="M0,62 L50,55 L100,68 L150,48 L200,58 L250,52 L300,60" stroke="#CBC7BB" stroke-width="1.5" fill="none" stroke-dasharray="3 3"/>
              <path d="M0,58 L50,40 L100,52 L150,28 L200,42 L250,22 L300,38 L300,100 L0,100 Z" fill="#7A97AB" opacity="0.15"/>
              <path d="M0,58 L50,40 L100,52 L150,28 L200,42 L250,22 L300,38" stroke="#0F2336" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="250" cy="22" r="4" fill="#A3A983" stroke="#fff" stroke-width="1.5"/>
            </svg>
          </div>
          <div class="x-axis"><span>1</span><span>5</span><span>10</span><span>15</span><span>20</span><span>25</span><span>30</span></div>
        </div>
        <div class="chart-card">
          <div class="chart-head">
            <div>
              <div class="chart-title">Por día de semana</div>
              <div class="chart-sub">Promedio del mes</div>
            </div>
          </div>
          <div class="bar-chart">
            <div class="bar" style="height:45%"><span class="bar-label">L</span></div>
            <div class="bar" style="height:58%"><span class="bar-label">M</span></div>
            <div class="bar" style="height:52%"><span class="bar-label">M</span></div>
            <div class="bar" style="height:70%"><span class="bar-label">J</span></div>
            <div class="bar" style="height:62%"><span class="bar-label">V</span></div>
            <div class="bar highlight" style="height:88%"><span class="bar-label">S</span></div>
            <div class="bar" style="height:75%"><span class="bar-label">D</span></div>
          </div>
        </div>
        
</div>
</div></div>
</body>
</html>
