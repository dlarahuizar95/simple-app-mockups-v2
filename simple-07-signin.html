<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple App — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>

:root{
  --navy:#0F2336;--navy-dk:#0a1a28;
  --blue:#7A97AB;--blue-lt:#A8BEC9;--blue-dk:#5d7a8e;
  --sage:#A3A983;--sage-dk:#7A7E5E;--sage-lt:#C5C7A5;--sage-bg:#F3F4EB;
  --page-bg:#EEEDE7;--screen-bg:#F5F4EE;
  --card-bg:#FFFFFF;--card-bg-alt:#FAF9F4;
  --surface-hi:#FFFFFF;--surface-low:#F0EFE9;
  --text:#0F2336;--text-md:#374151;--text-sm:#6B7280;
  --border:#E0DDD4;--border-soft:#EBE8DF;--border-strong:#CBC7BB;
  --success:#7A9D6B;--danger:#B85450;--warning:#C4913A;
  --r-sm:8px;--r:12px;--r-lg:20px;--r-xl:28px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;
  color:var(--text);background:var(--page-bg);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:40px 20px;
}
.phone{
  width:360px;height:740px;
  background:#0a0a0a;border-radius:54px;padding:11px;
  box-shadow:0 30px 80px -20px rgba(15,35,54,.25),0 12px 32px -12px rgba(15,35,54,.15);
  position:relative;flex-shrink:0;
}
.phone::before{
  content:'';position:absolute;top:22px;left:50%;
  transform:translateX(-50%);width:110px;height:30px;
  background:#000;border-radius:22px;z-index:10;
}
.screen{
  width:100%;height:100%;background:var(--screen-bg);
  border-radius:43px;overflow:hidden;position:relative;
  display:flex;flex-direction:column;
}
.status{
  height:48px;flex-shrink:0;display:flex;align-items:center;
  justify-content:space-between;padding:16px 32px 0;
  font-size:13px;font-weight:600;color:var(--text);
}
.status-right{display:flex;align-items:center;gap:6px}
.status-dot{width:17px;height:10px;border:1px solid var(--text);border-radius:2px;position:relative}
.status-dot::after{content:'';position:absolute;inset:1px;background:var(--text);border-radius:1px}
.app-header{padding:16px 24px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.app-back,.app-icon-btn{
  width:38px;height:38px;border-radius:50%;
  background:var(--surface-hi);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--text);
}
.app-wordmark{font-size:18px;font-weight:300;color:var(--text);letter-spacing:-.3px}
.app-wordmark strong{font-weight:600}
.content{flex:1;overflow:hidden;padding:0 24px 24px;display:flex;flex-direction:column;gap:18px}
.page-meta{margin-top:6px}
.eyebrow{
  font-size:10px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--sage-dk);
  display:flex;align-items:center;gap:8px;margin-bottom:7px;
}
.eyebrow::before{content:'';width:16px;height:1px;background:var(--sage)}
.page-h{font-size:27px;font-weight:700;letter-spacing:-.7px;line-height:1.1;color:var(--text)}
.page-h em{font-style:italic;font-family:'Cormorant Garamond',serif;font-weight:500;color:var(--blue)}
.page-sub-sm{font-size:13px;color:var(--text-sm);margin-top:5px;line-height:1.5}

/* Primary button shared */
.btn-primary{
  width:100%;padding:16px;background:var(--navy);color:#fff;
  border:none;border-radius:var(--r);font-family:inherit;
  font-size:13px;font-weight:600;letter-spacing:-.1px;
  display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;
}
.btn-secondary{
  width:100%;padding:15px;background:var(--card-bg);color:var(--text);
  border:1px solid var(--border);border-radius:var(--r);font-family:inherit;
  font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;
}


.signin-brand{text-align:center;margin-top:40px;margin-bottom:8px}
.signin-logo{font-size:32px;font-weight:300;color:var(--navy);letter-spacing:-.8px;margin-bottom:6px}
.signin-logo strong{font-weight:700}
.signin-tag{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--sage-dk);letter-spacing:.02em}
.signin-form{display:flex;flex-direction:column;gap:12px;margin-top:30px}
.form-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-sm);margin-bottom:6px}
.form-input{
  width:100%;padding:14px 16px;background:var(--card-bg);
  border:1px solid var(--border);border-radius:var(--r);
  font-family:inherit;font-size:13px;color:var(--text);
}
.form-input.filled{color:var(--text);font-weight:500}
.form-field{margin-bottom:4px}
.forgot{text-align:right;font-size:11px;color:var(--sage-dk);font-weight:600;margin-top:6px}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;font-size:10px;color:var(--text-sm);font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.social-btns{display:flex;flex-direction:column;gap:10px}
.legal{font-size:10px;color:var(--text-sm);text-align:center;line-height:1.6;margin-top:18px}
.legal a{color:var(--navy);text-decoration:underline}
.signup{font-size:12px;color:var(--text-sm);text-align:center;margin-top:20px}
.signup strong{color:var(--navy);font-weight:700}

</style>
</head>
<body>
<div class="phone"><div class="screen">

    <div class="status">
      <span>9:41</span>
      <div class="status-right"><span>5G</span><span>●●●</span><div class="status-dot"></div></div>
    </div>
    
<div class="content">

    <div class="signin-brand">
      <div class="signin-logo">simple<strong>.</strong></div>
      <div class="signin-tag">— agua sin complicaciones</div>
    </div>
    <div class="page-meta" style="text-align:center;margin-top:20px">
      <div class="page-h" style="font-size:22px">Bienvenida <em>de vuelta</em></div>
      <div class="page-sub-sm">Ingresa para continuar</div>
    </div>
    <div class="signin-form">
      <div class="form-field">
        <div class="form-label">Email</div>
        <input type="email" class="form-input filled" value="dlarahuizar@gmail.com" readonly>
      </div>
      <div class="form-field">
        <div class="form-label">Contraseña</div>
        <input type="password" class="form-input filled" value="••••••••••" readonly>
        <div class="forgot">¿Olvidaste tu contraseña?</div>
      </div>
      <button class="btn-primary" style="margin-top:8px">Continuar →</button>
    </div>
    <div class="divider">o continúa con</div>
    <div class="social-btns">
      <button class="btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuar con Google
      </button>
      <button class="btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        Continuar con Apple
      </button>
    </div>
    <div class="legal">Al continuar, aceptas nuestros<br><a href="#">Términos</a> y <a href="#">Política de privacidad</a></div>
    <div class="signup">¿Nueva por aquí? <strong>Crear cuenta</strong></div>
    
</div>
</div></div>
</body>
</html>
